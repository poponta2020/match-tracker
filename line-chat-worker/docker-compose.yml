# line-chat-worker 専用の docker-compose。
#
# 【重要】このワーカーは kagetra_new が稼働する同一VMへ配置するが、
# kagetra_new のコンテナ群とはプロセス・ネットワーク・ボリュームを完全に分離する
# （service名・network名・volume名は line-chat-worker- prefix を必ず付与する）。
services:
  line-chat-worker:
    build: .
    container_name: line-chat-worker
    restart: unless-stopped
    environment:
      TZ: Asia/Tokyo
      APP_BASE_URL: ${APP_BASE_URL}
      LINE_CHAT_WORKER_TOKEN: ${LINE_CHAT_WORKER_TOKEN}
      LINE_OAM_ACCOUNT_PATH: ${LINE_OAM_ACCOUNT_PATH}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-300000}
      DRY_RUN: ${DRY_RUN:-false}
      STORAGE_STATE_PATH: /data/storage-state.json
      ARTIFACT_DIR: /data/artifacts
      ARTIFACT_RETENTION_DAYS: ${ARTIFACT_RETENTION_DAYS:-14}
      # line-chat-auto-relogin: 30日SSO失効の先回り警告閾値（日）と自動再ログインのキルスイッチ。
      SSO_WARNING_THRESHOLD_DAYS: ${SSO_WARNING_THRESHOLD_DAYS:-3}
      AUTO_RELOGIN_ENABLED: ${AUTO_RELOGIN_ENABLED:-true}
    volumes:
      - line-chat-worker-data:/data
    networks:
      - line-chat-worker-net

volumes:
  line-chat-worker-data:
    name: line-chat-worker-data

networks:
  line-chat-worker-net:
    name: line-chat-worker-net
