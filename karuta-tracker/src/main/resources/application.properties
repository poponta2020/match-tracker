spring.application.name=match-tracker

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
# multipart の eager parsing を無効化し、ハンドラ呼び出し前に request body が消費されないようにする。
# /api/venue-reservation-proxy/fetch/** は raw な request.getInputStream() で body を上流に転送するが、
# Spring Boot のデフォルト (resolve-lazily=false) では multipart リクエストが DispatcherServlet 段階で
# StandardMultipartHttpServletRequest により eager に getParts() され、proxy が読む頃には InputStream が
# 空になる (Issue #579)。lazily=true にすると getParts()/getParameter() を明示的に呼ぶ場合だけ parse
# されるため、@RequestParam MultipartFile を使う既存エンドポイント (LineAdminController#setupRichMenu)
# にも影響しない。
spring.servlet.multipart.resolve-lazily=true

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/karuta_tracker}
spring.datasource.username=${DB_USERNAME:karuta}
spring.datasource.password=${DB_PASSWORD:karuta123}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Configuration
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=-1

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Batch INSERT/UPDATE: saveAll() などでフラッシュ時にまとめてJDBCに送る件数。
# WaitlistPromotionService#renumberRemainingWaitlist など多件同時保存処理の往復回数を削減する。
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.order_inserts=true

# Server Configuration
server.port=${PORT:8080}
# Render などの reverse proxy 配下では HTTPS が edge で終端され HTTP でコンテナへ転送される。
# X-Forwarded-Proto / X-Forwarded-Host を解釈させ、request.getScheme()/getServerName()/getServerPort()
# が公開URLの値を返すようにする。これをしないと same-origin の form POST (proxy view → fetch) で
# Spring の CORS チェックが cross-origin と誤判定し "Invalid CORS request" になる (Issue #570)。
server.forward-headers-strategy=framework

# Disable open-in-view for API-only backend responses
spring.jpa.open-in-view=false

# CORS allowed origins (comma-separated)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# Google Calendar API Configuration
google.calendar.application-name=${GOOGLE_CALENDAR_APP_NAME:karuta-match-tracker}

# Web Push (VAPID) Configuration
# Generate keys: npx web-push generate-vapid-keys
webpush.vapid.public-key=${VAPID_PUBLIC_KEY:}
webpush.vapid.private-key=${VAPID_PRIVATE_KEY:}
webpush.vapid.subject=${VAPID_SUBJECT:mailto:admin@example.com}

# LINE Notification Configuration
line.encryption-key=${LINE_ENCRYPTION_KEY:}

# Venue Reservation Proxy Configuration
venue-reservation-proxy.enabled=true
venue-reservation-proxy.session-timeout-minutes=15
venue-reservation-proxy.cleanup-interval-minutes=5
venue-reservation-proxy.request-timeout-seconds=30
venue-reservation-proxy.venues.kaderu.enabled=true
venue-reservation-proxy.venues.kaderu.base-url=https://k2.p-kashikan.jp
venue-reservation-proxy.venues.kaderu.user-id=${KADERU_USER_ID:}
venue-reservation-proxy.venues.kaderu.password=${KADERU_PASSWORD:}
venue-reservation-proxy.venues.higashi.enabled=false
venue-reservation-proxy.venues.higashi.base-url=https://www.sapporo-community.jp
venue-reservation-proxy.venues.higashi.user-id=${SAPPORO_COMMUNITY_USER_ID:}
venue-reservation-proxy.venues.higashi.password=${SAPPORO_COMMUNITY_PASSWORD:}

# Logging Configuration
logging.level.com.karuta.matchtracker=INFO
logging.level.org.hibernate.SQL=WARN

# Cache Configuration (Caffeine)
# players cache: 60s TTL for DensukeImportService scheduler
spring.cache.caffeine.spec=expireAfterWrite=60s
spring.cache.cache-names=players

# Actuator (for UptimeRobot health check)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
