# テスト用の設定ファイル
# Testcontainersが自動的にPostgreSQLコンテナを起動し、接続情報を設定します

# JPA/Hibernate設定
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ログレベル
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN

# LINE 認証情報の暗号化テスト鍵（base64 32バイト固定値）。
# full-context (@SpringBootTest) では LineEncryptionKeyProvider が起動時にこの鍵でホルダを populate する。
# @DataJpaTest スライスはプロバイダ (@Component) を読み込まないため、その種のテストは
# LineEncryptionKeyHolder を @BeforeEach/@AfterEach で明示制御する（本番鍵とは無関係のテスト専用値）。
line.encryption-key=i1paoEBF5XgTlTLDjO3C8Lv8wDa6S88CXCXjSno83LI=
