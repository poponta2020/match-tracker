<!--
  匿名化済み合成 HTML フィクスチャ。
  実ページから取得した live snapshot は個人情報・ページコード等を含むためコミット禁止。
  本ファイルは DensukeScraperLiveSnapshotTest で必要な以下のシナリオを再現する最小構成:
    - 3択ページ (○/△/×) のヘッダー構造
    - メンバー名と title 属性 ("M/d HH:mm" 形式 / 空文字 / 不正値) の混在
    - 2試合分の出欠データ (○/×/-)
  メンバー名は全て "メンバーA"〜"メンバーF" の匿名プレースホルダ。
-->
<table class="listtbl" cellspacing="0">
<tr>
  <td>&nbsp;</td>
  <td class="rline"><div align="center">○</div></td>
  <td class="rline"><div align="center">△</div></td>
  <td class="rline"><div align="center">×</div></td>
  <td nowrap><a href="javascript:memberdata(1001);" title="4/24 12:05">メンバーA</a></td>
  <td nowrap><a href="javascript:memberdata(1002);" title="4/23 18:07">メンバーB</a></td>

  <td nowrap><a href="javascript:memberdata(1005);" title="">メンバーE</a></td>
  <td nowrap><a href="javascript:memberdata(1006);" title="4/23 12:51">メンバーF</a></td>
</tr>
<tr>

  <td class="rline"><div align="center"><div class="col2">&nbsp;0</div></div></td>
  <td class="rline"><div align="center"><div class="col2">&nbsp;</div></div></td>
  <td class="rline"><div align="center"><div class="col2">&nbsp;1</div></div></td>
  <td><div align="center"><div class="col0">-</div></div></td>

  <td><div align="center"><div class="col0">-</div></div></td>
  <td><div align="center"><div class="col1">×</div></div></td>
</tr>
<tr>

</table>
</body>
