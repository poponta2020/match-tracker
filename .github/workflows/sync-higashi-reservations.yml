name: Sync Higashi Community Center Reservations to Practice Sessions

on:
  # 定期 cron は廃止。東区民の予約→練習日 sync は手動ボタン（練習日登録画面）→
  # sync-kaderu-reservations-manual.yml の hokudai ステップ経由でのみ起動する。
  # この workflow は workflow_dispatch での直接手動起動の経路として残す。
  workflow_dispatch:

concurrency:
  group: higashi-reservation-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./scripts/room-checker
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: ./scripts/room-checker
        run: npx playwright install --with-deps chromium

      - name: Sync reservations to practice sessions
        working-directory: ./scripts/room-checker
        run: node sync-higashi-reservations.js --months 2
        env:
          SAPPORO_COMMUNITY_USER_ID: ${{ secrets.SAPPORO_COMMUNITY_USER_ID }}
          SAPPORO_COMMUNITY_PASSWORD: ${{ secrets.SAPPORO_COMMUNITY_PASSWORD }}
          DATABASE_URL: ${{ secrets.KADERU_DATABASE_URL }}
