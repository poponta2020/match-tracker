name: Java CI with Gradle

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for Gradle wrapper
      working-directory: ./karuta-tracker
      run: chmod +x gradlew

    - name: Run tests
      working-directory: ./karuta-tracker
      run: ./gradlew test
      env:
        SPRING_PROFILES_ACTIVE: test

    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Gradle Tests
        path: karuta-tracker/build/test-results/test/*.xml
        reporter: java-junit
        fail-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          karuta-tracker/build/test-results/
          karuta-tracker/build/reports/jacoco/
