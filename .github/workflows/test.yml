name: Java CI with Gradle

# PR/push での自動実行は停止（2026-07-21）。実測で CI 失敗は実質フレーク(vitest 並列)のみ・
# 本物の回帰検知ゼロ、かつ main はブランチ保護なしでマージをブロックもしていなかった。
# ローカルテスト + 本番監視に一本化。ファイルは温存し、migration 等の怖い変更前に手動で
# 回せるよう workflow_dispatch だけ残す。
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    # dorny/test-reporter は GitHub Checks API で check run を作成するため checks: write が必須。
    # リポジトリ設定の workflow permissions がデフォルトの "Read repository contents and packages permissions"
    # の場合、permissions ブロック未指定だと GITHUB_TOKEN に checks: write が付与されず、
    # "Generate test report" ステップが silent に失敗する。
    permissions:
      contents: read
      checks: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for Gradle wrapper
      working-directory: ./karuta-tracker
      run: chmod +x gradlew

    - name: Run tests
      working-directory: ./karuta-tracker
      run: ./gradlew test
      env:
        SPRING_PROFILES_ACTIVE: test

    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Gradle Tests
        path: karuta-tracker/build/test-results/test/*.xml
        reporter: java-junit
        fail-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          karuta-tracker/build/test-results/
          karuta-tracker/build/reports/jacoco/

    # scripts/room-checker のリトライ・接続ユーティリティ (db-connect.js) の単体テスト。
    # cron 系 workflow は本番同期スクリプトを走らせるだけでテストゲートにならないので、
    # ここで PR CI に組み込んでリグレッションを検知する。
    - name: Set up Node.js (for room-checker tests)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install room-checker dependencies (no Playwright browsers)
      working-directory: ./scripts/room-checker
      env:
        # npm ci で playwright パッケージ自体は入れるが、Chromium バイナリ (~150MB) は不要なのでスキップ
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      run: npm ci

    - name: Run room-checker tests (node --test)
      working-directory: ./scripts/room-checker
      run: npm test

    # karuta-tracker-ui の Vitest テスト（コンポーネント結合 + 純粋関数）。
    # 同一ジョブ内で setup-node を共有するため、Node のセットアップは上の
    # room-checker 用ステップを再利用する（追加の setup-node は不要）。
    # lint は事前から多数のエラーが残っているため CI ゲートには含めない
    # （別タスクで lint クリーンアップしてから組み込む方針）。
    - name: Install karuta-tracker-ui dependencies
      working-directory: ./karuta-tracker-ui
      run: npm ci

    - name: Run karuta-tracker-ui tests (vitest)
      working-directory: ./karuta-tracker-ui
      run: npm test
