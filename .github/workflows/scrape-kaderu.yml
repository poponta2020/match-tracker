name: Scrape Kaderu Room Availability

on:
  schedule:
    # 毎時0分（UTC）。UTC 16-20（= JST 1-5時台）はスキップし、JST 6時に再開。1日19回。
    - cron: '0 0-15,21-23 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./scripts/room-checker
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: ./scripts/room-checker
        run: npx playwright install --with-deps chromium

      - name: Run scraping
        working-directory: ./scripts/room-checker
        run: node sync-to-db.js
        env:
          DATABASE_URL: ${{ secrets.KADERU_DATABASE_URL }}
