<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <!-- 胴体 -->
  <ellipse cx="60" cy="90" rx="28" ry="32" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- 頭 -->
  <ellipse cx="60" cy="52" rx="22" ry="22" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- 黒い頭頂部 -->
  <ellipse cx="60" cy="36" rx="18" ry="12" fill="#222"/>
  <!-- 目（左） -->
  <circle cx="52" cy="52" r="4" fill="#222"/>
  <circle cx="53" cy="51" r="1.2" fill="white"/>
  <!-- 目（右） -->
  <circle cx="68" cy="52" r="4" fill="#222"/>
  <circle cx="69" cy="51" r="1.2" fill="white"/>
  <!-- くちばし -->
  <path d="M58 60 L60 65 L62 60" fill="#f5a623" stroke="#e6941a" stroke-width="0.5"/>
  <!-- 左羽（ペンを持っている） -->
  <ellipse cx="35" cy="88" rx="10" ry="18" fill="#ddd" stroke="#333" stroke-width="1" transform="rotate(-15, 35, 88)"/>
  <!-- 右羽 -->
  <ellipse cx="85" cy="88" rx="10" ry="18" fill="#ddd" stroke="#333" stroke-width="1" transform="rotate(15, 85, 88)"/>
  <!-- しっぽ -->
  <path d="M50 118 Q60 135 70 118" stroke="#333" stroke-width="2" fill="#ddd"/>
  <!-- 足 -->
  <line x1="52" y1="120" x2="46" y2="132" stroke="#f5a623" stroke-width="2"/>
  <line x1="68" y1="120" x2="74" y2="132" stroke="#f5a623" stroke-width="2"/>
  <!-- ペン（左羽付近） -->
  <rect x="24" y="78" width="3" height="22" rx="1" fill="#4a6b5a" transform="rotate(-30, 24, 78)"/>
  <polygon points="24,96 27,96 25.5,103" fill="#333" transform="rotate(-30, 24, 78)"/>
  <!-- ほっぺ -->
  <ellipse cx="46" cy="58" rx="5" ry="3.5" fill="#ffb3c1" opacity="0.6"/>
  <ellipse cx="74" cy="58" rx="5" ry="3.5" fill="#ffb3c1" opacity="0.6"/>
</svg>
