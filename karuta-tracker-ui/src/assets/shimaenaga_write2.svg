<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <!-- 胴体 -->
  <ellipse cx="60" cy="90" rx="28" ry="32" fill="white" stroke="#333" stroke-width="1.5"/>
  <!-- 頭（少し傾いて集中している感じ） -->
  <ellipse cx="60" cy="52" rx="22" ry="22" fill="white" stroke="#333" stroke-width="1.5" transform="rotate(-8, 60, 52)"/>
  <!-- 黒い頭頂部 -->
  <ellipse cx="60" cy="36" rx="18" ry="12" fill="#222" transform="rotate(-8, 60, 36)"/>
  <!-- 目（左・少し細めて集中） -->
  <ellipse cx="51" cy="52" rx="3.5" ry="2.5" fill="#222"/>
  <circle cx="52" cy="51" r="1" fill="white"/>
  <!-- 目（右・少し細めて集中） -->
  <ellipse cx="69" cy="50" rx="3.5" ry="2.5" fill="#222"/>
  <circle cx="70" cy="49" r="1" fill="white"/>
  <!-- くちばし -->
  <path d="M57 60 L59 65 L61 60" fill="#f5a623" stroke="#e6941a" stroke-width="0.5"/>
  <!-- 左羽（前方に出してペンを動かしている） -->
  <ellipse cx="33" cy="95" rx="10" ry="16" fill="#ddd" stroke="#333" stroke-width="1" transform="rotate(-40, 33, 95)"/>
  <!-- 右羽 -->
  <ellipse cx="85" cy="90" rx="10" ry="18" fill="#ddd" stroke="#333" stroke-width="1" transform="rotate(12, 85, 90)"/>
  <!-- しっぽ -->
  <path d="M50 118 Q60 135 70 118" stroke="#333" stroke-width="2" fill="#ddd"/>
  <!-- 足 -->
  <line x1="52" y1="120" x2="46" y2="132" stroke="#f5a623" stroke-width="2"/>
  <line x1="68" y1="120" x2="74" y2="132" stroke="#f5a623" stroke-width="2"/>
  <!-- ペン（書いている・先端が低い位置に） -->
  <rect x="15" y="90" width="3" height="22" rx="1" fill="#4a6b5a" transform="rotate(-55, 15, 90)"/>
  <polygon points="15,108 18,108 16.5,115" fill="#333" transform="rotate(-55, 15, 90)"/>
  <!-- 書いた線（下に小さいラインで表現） -->
  <line x1="18" y1="118" x2="38" y2="120" stroke="#4a6b5a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="18" y1="122" x2="32" y2="124" stroke="#4a6b5a" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- ほっぺ -->
  <ellipse cx="45" cy="57" rx="5" ry="3.5" fill="#ffb3c1" opacity="0.6"/>
  <ellipse cx="73" cy="55" rx="5" ry="3.5" fill="#ffb3c1" opacity="0.6"/>
</svg>
